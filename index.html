<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rođendanska pozivnica</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@1&family=Jost:wght@300;400&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */

body{
margin:0;
font-family:'Jost',sans-serif;
color:#fff;
overflow-x:hidden;
background:#121212; /* Tamno siva podloga da bi se senka videla */
}

/* ================= ANIMIRANA SENKA CVETA ================= */

.bg-container {
    position: fixed;
    inset: 0;
    z-index: -1;
    background: #121212;
    overflow: hidden;
}

.flower-shadow {
    position: absolute;
    width: 100%;
    height: 100%;
    /* Koristimo jasnu PNG senku biljke */
    background: url("https://www.transparentpng.com/download/shadow/shadow-transparent-background-5.png") no-repeat center/cover;
    opacity: 0.3; /* Podešavaš koliko je senka jaka */
    filter: brightness(0); /* Pravimo je skroz crnom */
    animation: wind 12s ease-in-out infinite;
    transform-origin: bottom left;
}

@keyframes wind {
    0%, 100% { transform: scale(1.2) rotate(-5deg) translateX(0); }
    50% { transform: scale(1.25) rotate(2deg) translateX(20px); }
}

/* ================= SECTIONS ================= */

section{
padding:100px 20px;
text-align:center;
max-width:800px;
margin:auto;
position: relative;
}

/* ================= HERO & MONOGRAM ================= */

.monogram{
font-size:80px;
font-family:'Cormorant Garamond',serif;
letter-spacing:15px;
margin-bottom:10px;
color: #f5c96a;
}

/* ================= TIMELINE ================= */

.time-item{
border: 1px solid rgba(255,255,255,0.1);
padding: 25px;
margin-bottom: 15px;
border-radius: 15px;
background: rgba(255,255,255,0.03);
backdrop-filter: blur(5px);
}

/* ================= GALLERY ================= */

.gallery{
display:grid;
grid-template-columns: repeat(2, 1fr);
gap:10px;
}

.gallery img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

/* ================= MAPA (VRAĆENA) ================= */

.map-container {
    width: 100%;
    height: 300px;
    border-radius: 15px;
    overflow: hidden;
    margin-top: 20px;
}

iframe {
    width: 100%;
    height: 100%;
    border: 0;
    filter: invert(90%) hue-rotate(180deg) opacity(0.6);
}

/* ================= RSVP ================= */

.rsvp-form{
display:flex;
flex-direction:column;
gap:15px;
}

.rsvp-form input, .rsvp-form select{
padding:15px;
background: rgba(255,255,255,0.05);
border: 1px solid rgba(255,255,255,0.2);
color: white;
border-radius: 8px;
}

.rsvp-form button{
padding:18px;
background:#f5c96a;
border:none;
font-weight:bold;
letter-spacing: 2px;
cursor:pointer;
border-radius: 8px;
}

/* ================= FOOTER MONOGRAM ================= */

.footer-monogram {
    padding: 60px 0;
    font-size: 50px;
    font-family: 'Cormorant Garamond', serif;
    opacity: 0.4;
    letter-spacing: 10px;
}

</style>
</head>

<body>

<div class="bg-container">
    <div class="flower-shadow"></div>
</div>

<section>
    <div class="monogram">A M</div>
    <h1>Ana's Birthday</h1>
    <p>12. jul 2026 · Beograd</p>
</section>

<section>
    <h2>Satnica</h2>
    <div class="time-item">18:00 – Dolazak</div>
    <div class="time-item">20:00 – Večera</div>
    <div class="time-item">22:00 – Party 🎉</div>
</section>

<section>
    <h2>Galerija</h2>
    <div class="gallery">
        <img src="https://images.unsplash.com/photo-1530103043960-ef38714abb15?auto=format&fit=crop&w=500">
        <img src="https://images.unsplash.com/photo-1464366400600-7168b8af9bc3?auto=format&fit=crop&w=500">
    </div>
</section>

<section>
    <h2>Lokacija</h2>
    <div class="map-container">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2830.2031750567!2d20.457273!3d44.812544!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNDTCsDQ4JzQ1LjIiTiAyMMKwMjcnMjYuMiJF!5e0!3m2!1ssr!2srs!4v1620000000000"></iframe>
    </div>
</section>

<section>
    <h2>Potvrda dolaska</h2>
    <form class="rsvp-form">
        <input type="text" placeholder="Ime i prezime" required>
        <select required>
            <option value="" disabled selected>Dolazak</option>
            <option value="Dolazim">Dolazim</option>
            <option value="Ne dolazim">Ne dolazim</option>
        </select>
        <button type="submit">POŠALJI</button>
    </form>
</section>

<section class="footer-monogram">
    A M
</section>

</body>
</html>
</section>

</body>
</html>
