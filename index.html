<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rođendanska pozivnica</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>

:root {
  --cream: #f5f0e8;
  --ink:   #1a1610;
  --gold:  #c9a84c;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  color: var(--ink);
  background: var(--cream);
  overflow-x: hidden;
}

/* ── GRAIN ── */
body::before {
  content:'';
  position:fixed; inset:0; z-index:10;
  pointer-events:none; opacity:0.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px;
}

/* ── SHADOW STAGE ── */
.shadow-stage {
  position:fixed; inset:0; z-index:0;
  pointer-events:none; overflow:hidden;
}
.fw {
  position:absolute; bottom:0;
  transform-origin:bottom center;
  filter:blur(2px);
}
.fw.p1  { left:-3%;  animation:sa 9s  ease-in-out infinite; }
.fw.p2  { left:9%;   animation:sb 11s ease-in-out infinite 1.2s; }
.fw.p3  { left:20%;  animation:sa 13s ease-in-out infinite 0.4s; }
.fw.p4  { left:33%;  animation:sc 10s ease-in-out infinite 2s; }
.fw.p5  { left:48%;  animation:sb 12s ease-in-out infinite 0.8s; }
.fw.p6  { left:61%;  animation:sa 9.5s ease-in-out infinite 1.8s; }
.fw.p7  { left:74%;  animation:sc 11.5s ease-in-out infinite 0.3s; }
.fw.p8  { left:87%;  animation:sb 10.5s ease-in-out infinite 2.5s; }
.fw.p9  { left:97%;  animation:sa 8.5s ease-in-out infinite 0.9s; }
.far  { opacity:0.06; }
.mid  { opacity:0.10; }
.near { opacity:0.15; }
@keyframes sa {
  0%,100% { transform:rotate(-6deg); }
  50%      { transform:rotate(5deg) translateX(6px); }
}
@keyframes sb {
  0%,100% { transform:rotate(4deg); }
  50%      { transform:rotate(-7deg) translateX(-8px); }
}
@keyframes sc {
  0%,100% { transform:rotate(-3deg); }
  35%      { transform:rotate(7deg) translateX(10px); }
  70%      { transform:rotate(-5deg); }
}

/* ════════════════════════
   SCROLL REVEAL
════════════════════════ */
.reveal {
  opacity: 0;
  transform: translateY(32px);
  transition: opacity 0.9s cubic-bezier(0.22,1,0.36,1),
              transform 0.9s cubic-bezier(0.22,1,0.36,1);
}
.reveal.visible {
  opacity: 1;
  transform: translateY(0);
}

.reveal-stagger > * {
  opacity: 0;
  transform: translateY(22px);
  transition: opacity 0.75s cubic-bezier(0.22,1,0.36,1),
              transform 0.75s cubic-bezier(0.22,1,0.36,1);
}
.reveal-stagger.visible > *:nth-child(1) { opacity:1; transform:translateY(0); transition-delay:0.05s; }
.reveal-stagger.visible > *:nth-child(2) { opacity:1; transform:translateY(0); transition-delay:0.2s; }
.reveal-stagger.visible > *:nth-child(3) { opacity:1; transform:translateY(0); transition-delay:0.35s; }

/* ════════════════════════
   HERO ENTRANCE
════════════════════════ */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(28px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes fadeIn {
  from { opacity:0; }
  to   { opacity:1; }
}
@keyframes expandLine {
  from { height:0; opacity:0; }
  to   { height:64px; opacity:1; }
}
.hero .monogram  { animation:fadeUp 1.1s cubic-bezier(0.22,1,0.36,1) both 0.1s; }
.hero .divider   { animation:expandLine 0.9s cubic-bezier(0.22,1,0.36,1) both 0.55s; }
.hero h1         { animation:fadeUp 1s cubic-bezier(0.22,1,0.36,1) both 0.75s; }
.hero .hero-date { animation:fadeIn 1s ease both 1.1s; }

/* ── CONTENT ── */
.content { position:relative; z-index:2; }

section {
  padding:110px 24px;
  text-align:center;
  max-width:680px;
  margin:auto;
}
.hero { padding-top:150px; padding-bottom:90px; }

.monogram {
  font-family:'Cormorant Garamond',serif;
  font-weight:300; font-size:90px;
  letter-spacing:24px; color:var(--ink);
  line-height:1; margin-bottom:30px;
}
.hero h1 {
  font-family:'Cormorant Garamond',serif;
  font-weight:300; font-style:italic;
  font-size:38px; letter-spacing:4px;
  color:var(--ink); margin-bottom:16px;
}
.hero-date {
  font-family:'Jost',sans-serif;
  font-weight:200; font-size:11px;
  letter-spacing:7px; text-transform:uppercase;
  color:var(--gold);
}
.divider {
  width:1px; height:64px;
  background:linear-gradient(to bottom, transparent, var(--gold), transparent);
  margin:0 auto 30px;
}
h2 {
  font-family:'Cormorant Garamond',serif;
  font-weight:300; font-style:italic;
  font-size:30px; letter-spacing:3px;
  color:var(--ink); margin-bottom:40px;
}
.section-label {
  font-family:'Jost',sans-serif;
  font-weight:200; font-size:10px;
  letter-spacing:8px; text-transform:uppercase;
  color:var(--gold); margin-bottom:12px; display:block;
}

/* ── TIMELINE ── */
.timeline {
  border-left:1px solid rgba(26,22,16,0.12);
  margin-left:20px; padding-left:32px; text-align:left;
}
.time-item {
  padding:18px 0;
  border-bottom:1px solid rgba(26,22,16,0.06);
  position:relative;
}
.time-item::before {
  content:''; position:absolute;
  left:-37px; top:50%; transform:translateY(-50%);
  width:9px; height:9px; border-radius:50%;
  border:1px solid var(--gold); background:var(--cream);
  transition: background 0.3s, transform 0.3s;
}
.time-item:hover::before {
  background:var(--gold);
  transform:translateY(-50%) scale(1.35);
}
.time-item .t {
  font-family:'Cormorant Garamond',serif;
  font-weight:300; font-size:22px;
  color:var(--gold); letter-spacing:2px;
}
.time-item .l {
  font-family:'Jost',sans-serif;
  font-weight:200; font-size:12px;
  letter-spacing:4px; text-transform:uppercase;
  color:var(--ink); opacity:0.65; margin-top:2px;
}

/* ── GALLERY ── */
.gallery {
  display:grid;
  grid-template-columns:1.3fr 1fr;
  grid-template-rows:auto auto;
  gap:8px;
}
.gallery img {
  width:100%; object-fit:cover; display:block;
  opacity:0.9;
  transition: transform 0.65s cubic-bezier(0.22,1,0.36,1), opacity 0.4s;
}
.gallery img:hover { transform:scale(1.025); opacity:1; }
.gallery img:first-child { height:280px; grid-row:1/3; }
.gallery img:not(:first-child) { height:136px; }

/* ── MAP ── */
.map-wrap { width:100%; height:280px; overflow:hidden; margin-top:20px; }
iframe {
  width:100%; height:100%; border:0;
  filter:sepia(40%) contrast(0.9) brightness(1.05) opacity(0.85);
}

/* ════════════════════════
   RSVP — PILL BUTTONS
════════════════════════ */
.rsvp-form {
  display:flex; flex-direction:column;
  gap:14px; max-width:420px; margin:0 auto;
}
.rsvp-form input {
  padding:16px 20px;
  background:transparent; border:none;
  border-bottom:1px solid rgba(26,22,16,0.2);
  color:var(--ink);
  font-family:'Jost',sans-serif;
  font-weight:200; font-size:12px;
  letter-spacing:3px; outline:none;
  transition:border-color .3s;
}
.rsvp-form input::placeholder { color:rgba(26,22,16,0.35); text-transform:uppercase; }
.rsvp-form input:focus { border-bottom-color:var(--gold); }

/* Pill group */
.pill-group {
  display:flex; gap:10px; margin-top:6px;
}
.pill-group input[type="radio"] { display:none; }

.pill-group label {
  flex:1; padding:14px 0;
  border:1px solid rgba(26,22,16,0.2);
  font-family:'Jost',sans-serif;
  font-weight:300; font-size:10px;
  letter-spacing:5px; text-transform:uppercase;
  color:rgba(26,22,16,0.4);
  text-align:center; cursor:pointer;
  position:relative; overflow:hidden;
  transition:color 0.4s, border-color 0.4s;
  user-select:none;
}

/* Fill animation */
.pill-group label::before {
  content:'';
  position:absolute; inset:0;
  background:var(--ink);
  transform:scaleY(0);
  transform-origin:bottom;
  transition:transform 0.4s cubic-bezier(0.22,1,0.36,1);
  z-index:0;
}
.pill-group label span { position:relative; z-index:1; }

.pill-group input[type="radio"]:checked + label {
  color:var(--cream);
  border-color:var(--ink);
}
.pill-group input[type="radio"]:checked + label::before {
  transform:scaleY(1);
}
.pill-group label:hover {
  border-color:rgba(26,22,16,0.45);
  color:rgba(26,22,16,0.7);
}

/* Submit button with wipe animation */
.rsvp-form button {
  margin-top:22px; padding:16px 0;
  background:transparent; border:1px solid var(--ink);
  color:var(--ink);
  font-family:'Jost',sans-serif;
  font-weight:300; font-size:10px;
  letter-spacing:7px; text-transform:uppercase;
  cursor:pointer;
  position:relative; overflow:hidden;
  transition:color 0.4s;
}
.rsvp-form button::before {
  content:'';
  position:absolute; inset:0;
  background:var(--ink);
  transform:scaleX(0);
  transform-origin:left;
  transition:transform 0.45s cubic-bezier(0.22,1,0.36,1);
  z-index:0;
}
.rsvp-form button span { position:relative; z-index:1; }
.rsvp-form button:hover { color:var(--cream); }
.rsvp-form button:hover::before { transform:scaleX(1); }

/* Guest count — slides in when Dolazim selected */
.guest-count-wrap {
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  transition: max-height 0.55s cubic-bezier(0.22,1,0.36,1),
              opacity 0.4s ease;
}
.guest-count-wrap.open {
  max-height: 80px;
  opacity: 1;
}
.guest-count-inner {
  display: flex;
  align-items: center;
  border-bottom: 1px solid rgba(26,22,16,0.2);
  padding: 14px 20px;
  transition: border-color .3s;
}
.guest-count-inner:focus-within { border-bottom-color: var(--gold); }
.guest-count-inner label {
  font-family: 'Jost', sans-serif;
  font-weight: 200; font-size: 12px;
  letter-spacing: 3px; text-transform: uppercase;
  color: rgba(26,22,16,0.45);
  white-space: nowrap;
}
.stepper {
  display: flex; align-items: center; gap: 16px;
  margin-left: auto;
}
.stepper button {
  all: unset;
  width: 26px; height: 26px;
  border: 1px solid rgba(26,22,16,0.25);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; color: var(--ink);
  cursor: pointer;
  transition: background 0.3s, color 0.3s, border-color 0.3s;
}
.stepper button:hover { background:var(--ink); color:var(--cream); border-color:var(--ink); }
.stepper-val {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300; font-size: 22px;
  letter-spacing: 2px; color: var(--ink);
  min-width: 28px; text-align: center;
}

/* Success message */
.rsvp-success {
  display:none; opacity:0;
  font-family:'Cormorant Garamond',serif;
  font-style:italic; font-size:24px;
  letter-spacing:2px; color:var(--ink);
  text-align:center; margin-top:10px;
  transition:opacity 0.8s ease;
}
.rsvp-success.show { display:block; }
.rsvp-success.visible { opacity:1; }

/* ── PORUKA SLAVLJENICI ── */
.message-section { text-align: center; }

.message-wall {
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin-bottom: 40px;
  max-height: 420px;
  overflow-y: auto;
  padding-right: 4px;
  scrollbar-width: thin;
  scrollbar-color: rgba(26,22,16,0.12) transparent;
}
.message-wall::-webkit-scrollbar { width: 3px; }
.message-wall::-webkit-scrollbar-thumb { background: rgba(26,22,16,0.15); border-radius: 2px; }

.message-card {
  border: 1px solid rgba(26,22,16,0.08);
  padding: 22px 26px;
  text-align: left;
  position: relative;
  background: rgba(255,255,255,0.35);
  opacity: 0;
  transform: translateY(16px);
  animation: cardIn 0.6s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes cardIn {
  to { opacity:1; transform:translateY(0); }
}

.message-card .mc-quote {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 17px;
  line-height: 1.65;
  letter-spacing: 0.5px;
  color: var(--ink);
  margin-bottom: 10px;
}
.message-card .mc-author {
  font-family: 'Jost', sans-serif;
  font-weight: 200;
  font-size: 10px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--gold);
}
.message-card .mc-ornament {
  position: absolute;
  top: 14px; right: 18px;
  font-size: 22px;
  opacity: 0.12;
  font-family: 'Cormorant Garamond', serif;
  line-height: 1;
}

/* Delete button on each card */
.mc-delete {
  position: absolute;
  bottom: 12px; right: 14px;
  background: none; border: none;
  font-family: 'Jost', sans-serif;
  font-weight: 200; font-size: 9px;
  letter-spacing: 3px; text-transform: uppercase;
  color: rgba(26,22,16,0.2);
  cursor: pointer;
  padding: 2px 0;
  transition: color 0.3s;
}
.mc-delete:hover { color: #b94040; }

/* Admin clear-all button */
.msg-admin {
  margin-top: 16px;
  text-align: center;
}
.msg-clear-all {
  background: none; border: none;
  font-family: 'Jost', sans-serif;
  font-weight: 200; font-size: 9px;
  letter-spacing: 4px; text-transform: uppercase;
  color: rgba(26,22,16,0.18);
  cursor: pointer;
  padding: 4px 0;
  border-bottom: 1px solid transparent;
  transition: color 0.3s, border-color 0.3s;
}
.msg-clear-all:hover { color: #b94040; border-bottom-color: #b94040; }

/* Empty state */
.message-empty {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 18px;
  color: rgba(26,22,16,0.3);
  padding: 30px 0;
  letter-spacing: 1px;
}

/* Message form */
.message-form {
  display: flex;
  flex-direction: column;
  gap: 0;
  max-width: 480px;
  margin: 0 auto;
  border: 1px solid rgba(26,22,16,0.1);
  padding: 28px;
  background: rgba(255,255,255,0.3);
}

.message-form input,
.message-form textarea {
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(26,22,16,0.15);
  padding: 14px 0;
  font-family: 'Jost', sans-serif;
  font-weight: 200;
  font-size: 12px;
  letter-spacing: 3px;
  color: var(--ink);
  outline: none;
  width: 100%;
  resize: none;
  transition: border-color 0.3s;
}
.message-form input::placeholder,
.message-form textarea::placeholder {
  color: rgba(26,22,16,0.3);
  text-transform: uppercase;
}
.message-form input:focus,
.message-form textarea:focus { border-bottom-color: var(--gold); }

.message-form textarea {
  min-height: 80px;
  margin-top: 14px;
  line-height: 1.8;
}

.message-form button {
  margin-top: 24px;
  padding: 15px 0;
  background: transparent;
  border: 1px solid var(--ink);
  color: var(--ink);
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  font-size: 10px;
  letter-spacing: 7px;
  text-transform: uppercase;
  cursor: pointer;
  position: relative; overflow: hidden;
  transition: color 0.4s;
}
.message-form button::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--ink);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.45s cubic-bezier(0.22,1,0.36,1);
  z-index: 0;
}
.message-form button span { position: relative; z-index: 1; }
.message-form button:hover { color: var(--cream); }
.message-form button:hover::before { transform: scaleX(1); }

/* ── FOOTER ── */
.footer-mono {
  padding:80px 0 100px;
  font-family:'Cormorant Garamond',serif;
  font-weight:300; font-style:italic;
  font-size:52px; letter-spacing:18px;
  opacity:0.18; color:var(--ink); text-align:center;
}

</style>
</head>
<body>

<!-- ══════ FLOWER SHADOWS ══════ -->
<div class="shadow-stage">
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <g id="poppy">
        <path d="M0,0 C-8,-18 -22,-38 -14,-58 C-6,-74 6,-74 14,-58 C22,-38 8,-18 0,0Z" fill="#1a1610"/>
        <path d="M0,0 C18,-8 38,-22 58,-14 C74,-6 74,6 58,14 C38,22 18,8 0,0Z" fill="#1a1610"/>
        <path d="M0,0 C8,18 22,38 14,58 C6,74 -6,74 -14,58 C-22,38 -8,18 0,0Z" fill="#1a1610"/>
        <path d="M0,0 C-18,8 -38,22 -58,14 C-74,6 -74,-6 -58,-14 C-38,-22 -18,-8 0,0Z" fill="#1a1610"/>
        <circle cx="0" cy="0" r="10" fill="#1a1610"/>
      </g>
      <g id="cosmos">
        <path d="M0,0 C-5,-14 -4,-34 0,-52 C4,-34 5,-14 0,0Z" fill="#1a1610" transform="rotate(0)"/>
        <path d="M0,0 C-5,-14 -4,-34 0,-52 C4,-34 5,-14 0,0Z" fill="#1a1610" transform="rotate(45)"/>
        <path d="M0,0 C-5,-14 -4,-34 0,-52 C4,-34 5,-14 0,0Z" fill="#1a1610" transform="rotate(90)"/>
        <path d="M0,0 C-5,-14 -4,-34 0,-52 C4,-34 5,-14 0,0Z" fill="#1a1610" transform="rotate(135)"/>
        <path d="M0,0 C-5,-14 -4,-34 0,-52 C4,-34 5,-14 0,0Z" fill="#1a1610" transform="rotate(180)"/>
        <path d="M0,0 C-5,-14 -4,-34 0,-52 C4,-34 5,-14 0,0Z" fill="#1a1610" transform="rotate(225)"/>
        <path d="M0,0 C-5,-14 -4,-34 0,-52 C4,-34 5,-14 0,0Z" fill="#1a1610" transform="rotate(270)"/>
        <path d="M0,0 C-5,-14 -4,-34 0,-52 C4,-34 5,-14 0,0Z" fill="#1a1610" transform="rotate(315)"/>
        <circle cx="0" cy="0" r="7" fill="#1a1610"/>
      </g>
      <g id="tulip">
        <path d="M0,0 C-12,-10 -18,-30 -10,-52 C-4,-66 4,-66 10,-52 C18,-30 12,-10 0,0Z" fill="#1a1610"/>
        <path d="M0,0 C12,-6 30,-10 44,-2 C56,6 52,18 38,20 C22,22 8,10 0,0Z" fill="#1a1610"/>
        <path d="M0,0 C-12,-6 -30,-10 -44,-2 C-56,6 -52,18 -38,20 C-22,22 -8,10 0,0Z" fill="#1a1610"/>
        <path d="M0,0 C-7,-8 -10,-22 -4,-38 C-1,-46 1,-46 4,-38 C10,-22 7,-8 0,0Z" fill="#1a1610"/>
      </g>
      <g id="leaf-l">
        <path d="M0,0 C-8,-12 -18,-28 -12,-46 C-6,-58 2,-52 4,-38 C8,-22 4,-8 0,0Z" fill="#1a1610"/>
      </g>
      <g id="leaf-r">
        <path d="M0,0 C8,-12 18,-28 12,-46 C6,-58 -2,-52 -4,-38 C-8,-22 -4,-8 0,0Z" fill="#1a1610"/>
      </g>
    </defs>
  </svg>

  <!-- FAR -->
  <div class="fw p2 far">
    <svg width="120" height="800" viewBox="0 0 120 800" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M60 800 C58 720 64 640 60 540 C56 450 62 360 60 270 C58 210 62 170 60 130" stroke="#1a1610" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <g transform="translate(60,560) rotate(-15)"><use href="#leaf-l"/></g>
      <g transform="translate(60,620) rotate(18)"><use href="#leaf-r"/></g>
      <g transform="translate(60,460) rotate(-20)"><use href="#leaf-l"/></g>
      <g transform="translate(60,70) scale(0.85)"><use href="#poppy"/></g>
    </svg>
  </div>
  <div class="fw p5 far">
    <svg width="100" height="760" viewBox="0 0 100 760" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 760 C48 685 53 605 50 510 C47 425 52 340 50 255 C48 195 52 155 50 115" stroke="#1a1610" stroke-width="2.2" stroke-linecap="round" fill="none"/>
      <path d="M50 380 C62 358 70 330 66 308" stroke="#1a1610" stroke-width="1.8" stroke-linecap="round" fill="none"/>
      <g transform="translate(66,290) scale(0.5)"><use href="#cosmos"/></g>
      <g transform="translate(50,530) rotate(-22)"><use href="#leaf-l"/></g>
      <g transform="translate(50,590) rotate(20)"><use href="#leaf-r"/></g>
      <g transform="translate(50,65) scale(0.78)"><use href="#cosmos"/></g>
    </svg>

<!-- ══════ CONTENT ══════ -->
<div class="content">

  <section class="hero">
    <div class="monogram">A &thinsp; M</div>
    <div class="divider"></div>
    <h1>Ana's Birthday</h1>
    <p class="hero-date">12. jul 2026 &nbsp;·&nbsp; Beograd</p>
  </section>

  <section>
    <div class="reveal">
      <span class="section-label">Program večeri</span>
      <h2>Satnica</h2>
    </div>
    <div class="timeline reveal-stagger">
      <div class="time-item">
        <div class="t">18:00</div>
        <div class="l">Dolazak</div>
      </div>
      <div class="time-item">
        <div class="t">20:00</div>
        <div class="l">Večera</div>
      </div>
      <div class="time-item">
        <div class="t">22:00</div>
        <div class="l">Proslava</div>
      </div>
    </div>
  </section>

  <section>
    <div class="reveal">
      <span class="section-label">Trenuci</span>
      <h2>Galerija</h2>
    </div>
    <div class="gallery reveal">
      <!-- Large: blush roses bouquet — photo by Maryam Sicard -->
      <img
        src="https://images.unsplash.com/photo-1490750967868-88df5691cc5a?auto=format&fit=crop&w=600&q=80"
        onerror="this.src='https://picsum.photos/seed/roses/600/700'"
        alt="Ruže">
      <!-- Top right: pink peonies — photo by Annie Spratt -->
      <img
        src="https://images.unsplash.com/photo-1455659817273-f96807779a8a?auto=format&fit=crop&w=400&q=80"
        onerror="this.src='https://picsum.photos/seed/peony/400/300'"
        alt="Božuri">
      <!-- Bottom right: soft floral detail — photo by Liana Mikah -->
      <img
        src="https://images.unsplash.com/photo-1520763185298-1b434c919102?auto=format&fit=crop&w=400&q=80"
        onerror="this.src='https://picsum.photos/seed/flowers/400/300'"
        alt="Cveće">
    </div>
  </section>

  <section>
    <div class="reveal">
      <span class="section-label">Gde nas naći</span>
      <h2>Lokacija</h2>
    </div>
    <div class="map-wrap reveal">
      <iframe src="<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d172177.2562481461!2d20.257659958976102!3d44.815225536780574!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x475a7aa3d7b53fbd%3A0x1db8645cf2177ee4!2z0JHQtdC-0LPRgNCw0LQ!5e1!3m2!1ssr!2srs!4v1775246965441!5m2!1ssr!2srs" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>"></iframe>

      <input type="text" placeholder="Ime i prezime" required id="rsvpName">

      <div class="pill-group">
        <input type="radio" name="dolazak" id="pill-da" value="Dolazim">
        <label for="pill-da"><span>Dolazim</span></label>
        <input type="radio" name="dolazak" id="pill-ne" value="Ne dolazim">
        <label for="pill-ne"><span>Ne dolazim</span></label>
      </div>

      <!-- Guest count: visible only when "Dolazim" selected -->
      <div class="guest-count-wrap" id="guestWrap">
        <div class="guest-count-inner">
          <label>Broj gostiju</label>
          <div class="stepper">
            <button type="button" id="stepDown" aria-label="Manje">−</button>
            <span class="stepper-val" id="guestVal">1</span>
            <button type="button" id="stepUp" aria-label="Više">+</button>
          </div>
        </div>
      </div>

      <button type="submit"><span>Potvrdi</span></button>
    </form>
    <p class="rsvp-success" id="rsvpSuccess">Hvala, vidimo se ✦</p>
  </section>

  <!-- PORUKA SLAVLJENICI -->
  <section class="message-section">
    <div class="reveal">
      <span class="section-label">Za Anu</span>
      <h2>Poruka slavljenici</h2>
    </div>

    <!-- Wall of messages -->
    <div class="message-wall reveal" id="messageWall">
      <p class="message-empty" id="msgEmpty">Budi prvi koji ostavi poruku ✦</p>
    </div>
    <div class="msg-admin" id="msgAdmin" style="display:none">
      <button class="msg-clear-all" id="msgClearAll">Obriši sve poruke</button>
    </div>

    <!-- Message form -->
    <div class="message-form reveal" id="msgForm">
      <input type="text" id="msgAuthor" placeholder="Tvoje ime" maxlength="60">
      <textarea id="msgText" placeholder="Tvoja poruka..." maxlength="300" rows="3"></textarea>
      <button type="button" id="msgSubmit"><span>Pošalji poruku</span></button>
    </div>
  </section>

  <div class="footer-mono reveal">A &thinsp; M</div>

<script>
/* ── Scroll reveal ── */
const obs = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('visible');
      obs.unobserve(e.target);
    }
  });
}, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
document.querySelectorAll('.reveal, .reveal-stagger').forEach(el => obs.observe(el));

/* ── Guest count stepper ── */
let guestCount = 1;
const guestVal  = document.getElementById('guestVal');
const guestWrap = document.getElementById('guestWrap');

document.getElementById('stepUp').addEventListener('click', () => {
  guestCount = Math.min(guestCount + 1, 20);
  guestVal.textContent = guestCount;
});
document.getElementById('stepDown').addEventListener('click', () => {
  guestCount = Math.max(guestCount - 1, 1);
  guestVal.textContent = guestCount;
});

document.querySelectorAll('input[name="dolazak"]').forEach(radio => {
  radio.addEventListener('change', () => {
    if (radio.value === 'Dolazim') {
      guestWrap.classList.add('open');
      guestCount = 1; guestVal.textContent = '1';
    } else {
      guestWrap.classList.remove('open');
    }
  });
});

/* ── RSVP submit ── */
document.getElementById('rsvpForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const name   = document.getElementById('rsvpName').value.trim();
  const choice = document.querySelector('input[name="dolazak"]:checked');
  if (!name || !choice) return;
  const dolazi = choice.value === 'Dolazim';
  const guests = dolazi ? guestCount : 0;
  let msg = dolazi
    ? (guests === 1 ? 'Hvala, vidimo se! ✦' : `Hvala! Čekamo vas ${guests}. ✦`)
    : 'Žao nam je što nećeš doći. ✦';
  const form = document.getElementById('rsvpForm');
  form.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
  form.style.opacity = '0'; form.style.transform = 'translateY(10px)';
  setTimeout(() => {
    form.style.display = 'none';
    const successEl = document.getElementById('rsvpSuccess');
    successEl.textContent = msg;
    successEl.classList.add('show');
    requestAnimationFrame(() => requestAnimationFrame(() => successEl.classList.add('visible')));
  }, 500);
});

/* ══════════════════════════════════════
   PORUKE — localStorage perzistentne
══════════════════════════════════════ */
const LS_KEY = 'ana_birthday_messages';

function loadMessages() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
  catch { return []; }
}
function saveMessages(msgs) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(msgs)); } catch {}
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function deleteMessage(id) {
  let msgs = loadMessages();
  msgs = msgs.filter(m => m.id !== id);
  saveMessages(msgs);
  renderMessages(false);
}

function renderMessages(animateAll = true) {
  const wall    = document.getElementById('messageWall');
  const empty   = document.getElementById('msgEmpty');
  const admin   = document.getElementById('msgAdmin');
  const msgs    = loadMessages();

  wall.querySelectorAll('.message-card').forEach(c => c.remove());

  if (msgs.length === 0) {
    empty.style.display = 'block';
    admin.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  admin.style.display = 'block';

  // Newest first
  [...msgs].reverse().forEach((m, i) => {
    const card = document.createElement('div');
    card.className = 'message-card';
    if (animateAll) card.style.animationDelay = `${i * 0.08}s`;
    card.innerHTML = `
      <span class="mc-ornament">"</span>
      <p class="mc-quote">${escHtml(m.text)}</p>
      <p class="mc-author">${escHtml(m.author)}</p>
      <button class="mc-delete" data-id="${m.id}">Obriši</button>
    `;
    wall.appendChild(card);
  });

  // Attach delete handlers
  wall.querySelectorAll('.mc-delete').forEach(btn => {
    btn.addEventListener('click', () => {
      const card = btn.closest('.message-card');
      card.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
      card.style.opacity = '0';
      card.style.transform = 'translateX(12px)';
      setTimeout(() => deleteMessage(btn.dataset.id), 360);
    });
  });
}

/* Submit new message */
document.getElementById('msgSubmit').addEventListener('click', () => {
  const author = document.getElementById('msgAuthor').value.trim();
  const text   = document.getElementById('msgText').value.trim();

  if (!author || !text) {
    ['msgAuthor','msgText'].forEach(id => {
      const el = document.getElementById(id);
      if (!el.value.trim()) {
        el.style.borderBottomColor = '#b94040';
        setTimeout(() => el.style.borderBottomColor = '', 1200);
      }
    });
    return;
  }

  const msgs = loadMessages();
  msgs.push({
    id: Date.now().toString(),
    author,
    text,
    ts: new Date().toISOString()
  });
  saveMessages(msgs);

  document.getElementById('msgAuthor').value = '';
  document.getElementById('msgText').value   = '';
  renderMessages(false);

  // Animate newest card (first in wall after re-render)
  const first = document.querySelector('.message-card');
  if (first) {
    first.style.animation = 'none';
    first.style.opacity = '0';
    first.style.transform = 'translateY(14px)';
    requestAnimationFrame(() => {
      first.style.transition = 'opacity 0.5s ease, transform 0.5s cubic-bezier(0.22,1,0.36,1)';
      first.style.opacity = '1';
      first.style.transform = 'translateY(0)';
    });
  }

  document.getElementById('messageWall').scrollTo({ top: 0, behavior: 'smooth' });
});

/* Clear all */
document.getElementById('msgClearAll').addEventListener('click', () => {
  if (!confirm('Obrisati sve poruke?')) return;
  saveMessages([]);
  renderMessages(false);
});

/* Init */
renderMessages();
</script>
